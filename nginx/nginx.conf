events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    server {
        listen 80;
        server_name localhost;

        # Root Landing Page
        location = / {
            return 200 '<!DOCTYPE html>
<html>
<head>
    <title>DevOps Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; padding: 40px 20px; }
        .container { max-width: 700px; width: 100%; }
        h1 { color: #00d4ff; margin-bottom: 8px; }
        .subtitle { color: #aaa; margin-bottom: 30px; }
        .service { background: #16213e; padding: 16px 20px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #00d4ff; display: flex; justify-content: space-between; align-items: center; }
        .service-info h3 { color: #fff; margin-bottom: 4px; }
        .service-info p { color: #888; font-size: 13px; }
        a.btn { background: #00d4ff; color: #000; padding: 8px 16px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; white-space: nowrap; }
        a.btn:hover { background: #00b8d9; }
    </style>
</head>
<body>
<div class="container">
    <h1>DevOps Stack</h1>
    <p class="subtitle">All services running via Nginx reverse proxy</p>
    <div class="service">
        <div class="service-info"><h3>Jenkins</h3><p>CI/CD Automation</p></div>
        <a class="btn" href="/jenkins">Open</a>
    </div>
    <div class="service">
        <div class="service-info"><h3>Grafana</h3><p>Dashboards - admin/admin123</p></div>
        <a class="btn" href="/grafana/">Open</a>
    </div>
    <div class="service">
        <div class="service-info"><h3>SonarQube</h3><p>Code Quality - admin/admin</p></div>
        <a class="btn" href="/sonar/">Open</a>
    </div>
    <div class="service">
        <div class="service-info"><h3>Kafka UI</h3><p>Kafka Cluster Management</p></div>
        <a class="btn" href="/kafka-ui/">Open</a>
    </div>
    <div class="service">
        <div class="service-info"><h3>Prometheus</h3><p>Metrics and Alerting</p></div>
        <a class="btn" href="/prometheus/">Open</a>
    </div>
</div>
</body>
</html>';
            add_header Content-Type "text/html; charset=utf-8";
        }

        # Jenkins
        location /jenkins {
            proxy_pass http://jenkins:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 90;
            proxy_redirect http://jenkins:8080 http://$host;
        }

        # Grafana - proxy_pass includes /grafana/ so Grafana gets the path it expects
        location = /grafana {
            return 301 /grafana/;
        }

        location /grafana/ {
            proxy_pass http://grafana:3000/grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # SonarQube
        location = /sonar {
            return 301 /sonar/;
        }

        location /sonar/ {
            proxy_pass http://sonarqube:9000/sonar/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Kafka UI
        location = /kafka-ui {
            return 301 /kafka-ui/;
        }

        location /kafka-ui/ {
            proxy_pass http://kafka-ui:8080/kafka-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Prometheus
        location = /prometheus {
            return 301 /prometheus/;
        }

        location /prometheus/ {
            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
