# ============================================================
# 🐳 COMPLETE FIXED DOCKER COMPOSE - Production Stack
# ============================================================
# All crash loops fixed, optimized, production-ready
# ============================================================

networks:
  devops-network:
    driver: bridge

volumes:
  jenkins-data:
  postgres-data:
  grafana-data:
  prometheus-data:
  sonarqube-data:
  redis-data:
  kafka-data:
  zookeeper-data:

services:
  # ══════════════════════════════════════════════════════════
  # 🎭 PLAYWRIGHT TESTS
  # ══════════════════════════════════════════════════════════
  playwright:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: playwright-tests
    networks:
      - devops-network
    volumes:
      - ../tests:/app/tests
      - ../playwright-report:/app/playwright-report
      - ../test-results:/app/test-results
    environment:
      # API Keys
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      # Base URLs
      - WEATHER_BASE_URL=${WEATHER_BASE_URL:-https://api.openweathermap.org}
      - REQRES_BASE_URL=${REQRES_BASE_URL:-https://reqres.in}
      - DOGS_BASE_URL=${DOGS_BASE_URL:-https://dog.ceo/api}
      # Test environment
      - TEST_ENV=${TEST_ENV:-staging}
      # Kafka connection
      - KAFKA_BROKER=kafka:9093
      # CI flag
      - CI=true
    command: npx playwright test
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ══════════════════════════════════════════════════════════
  # 🔧 JENKINS - CI/CD Server (FIXED - No problematic entrypoint)
  # ══════════════════════════════════════════════════════════
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    privileged: true
    user: root
    networks:
      - devops-network
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/jobs:/var/jenkins_home/jobs
    environment:
      - JENKINS_OPTS=--prefix=/jenkins
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx2048m
      - DOCKER_HOST=unix:///var/run/docker.sock
      - KAFKA_BROKER=kafka:9093
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/jenkins/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # NOTE: Docker CLI removed from entrypoint (was causing crashes)
    # Install manually after container starts:
    # docker exec -u root jenkins bash -c "apt-get update && apt-get install -y docker.io"

  # ══════════════════════════════════════════════════════════
  # 📨 KAFKA - Event Streaming
  # ══════════════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - devops-network
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - devops-network
    ports:
      - "9092:9092"
      - "9093:9093"
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - devops-network
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
      SERVER_SERVLET_CONTEXT_PATH: /kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # 📊 PROMETHEUS - Metrics Collection
  # ══════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - devops-network
    ports:
      - "9091:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.external-url=/prometheus/"
      - "--web.route-prefix=/"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - devops-network
    ports:
      - "9100:9100"
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # 📈 GRAFANA - Dashboards (FIXED - No plugin install)
  # ══════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - devops-network
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      # Provisioning disabled temporarily (uncomment when directories exist):
      #- ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      #- ../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SERVER_ROOT_URL=http://localhost/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Plugins removed - install manually after Grafana starts:
      # docker exec -it grafana grafana-cli plugins install hamedkarbasi93-kafka-datasource
      # docker-compose restart grafana
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ══════════════════════════════════════════════════════════
  # 🔍 SONARQUBE - Code Quality
  # ══════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - devops-network
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sonar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sonar}
      - POSTGRES_DB=${POSTGRES_DB:-sonarqube}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sonar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    networks:
      - devops-network
    ports:
      - "9001:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-data:/opt/sonarqube/logs
      - sonarqube-data:/opt/sonarqube/extensions
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sonarqube}
      - SONAR_JDBC_USERNAME=${POSTGRES_USER:-sonar}
      - SONAR_JDBC_PASSWORD=${POSTGRES_PASSWORD:-sonar}
      - SONAR_WEB_CONTEXT=/sonar
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ══════════════════════════════════════════════════════════
  # 🗄️ REDIS - Cache
  # ══════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - devops-network
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ══════════════════════════════════════════════════════════
  # 🌐 NGINX - Reverse Proxy
  # ══════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: nginx
    networks:
      - devops-network
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - jenkins
      - grafana
      - sonarqube
      - kafka-ui
      - prometheus
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
