# ============================================================
# 🐳 COMPLETE DOCKER COMPOSE - Production Stack
# ============================================================
# Services:
# ✅ Playwright Tests
# ✅ Jenkins (CI/CD)
# ✅ Kafka + Zookeeper (Event Streaming)
# ✅ Prometheus (Metrics)
# ✅ Grafana (Dashboards)
# ✅ SonarQube (Code Quality)
# ✅ PostgreSQL (Database)
# ✅ Redis (Cache)
# ✅ Nginx (Reverse Proxy)
# ============================================================

networks:
  devops-network:
    driver: bridge

volumes:
  jenkins-data:
  postgres-data:
  grafana-data:
  prometheus-data:
  sonarqube-data:
  redis-data:
  kafka-data:
  zookeeper-data:

services:
  # ══════════════════════════════════════════════════════════
  # 🎭 PLAYWRIGHT TESTS
  # ══════════════════════════════════════════════════════════
  playwright:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: playwright-tests
    networks:
      - devops-network
    volumes:
      - ../tests:/app/tests
      - ../playwright-report:/app/playwright-report
      - ../test-results:/app/test-results
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - WEATHER_BASE_URL=${WEATHER_BASE_URL:-https://api.openweathermap.org}
      - REQRES_BASE_URL=${REQRES_BASE_URL:-https://reqres.in}
      - DOGS_BASE_URL=${DOGS_BASE_URL:-https://dog.ceo/api}
      - TEST_ENV=${TEST_ENV:-staging}
      - CI=true
    command: npx playwright test
    depends_on:
      - kafka

  # ══════════════════════════════════════════════════════════
  # 🔧 JENKINS - CI/CD Server
  # ══════════════════════════════════════════════════════════
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    privileged: true
    user: root
    networks:
      - devops-network
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/jobs:/var/jenkins_home/jobs
    environment:
      - JENKINS_OPTS=--prefix=/jenkins
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/jenkins/login"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ══════════════════════════════════════════════════════════
  #  KAFKA - Event Streaming
  # ══════════════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - devops-network
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - devops-network
    ports:
      - "9092:9092"
      - "9093:9093"
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - devops-network
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
      SERVER_SERVLET_CONTEXT_PATH: /kafka-ui
    depends_on:
      - kafka
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # PROMETHEUS - Metrics Collection
  # ══════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - devops-network
    ports:
      - "9091:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.external-url=/prometheus/"
      - "--web.route-prefix=/"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - devops-network
    ports:
      - "9100:9100"
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # GRAFANA - Dashboards
  # ══════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - devops-network
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SERVER_ROOT_URL=http://localhost/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # 🔍 SONARQUBE - Code Quality
  # ══════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    networks:
      - devops-network
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: unless-stopped

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    networks:
      - devops-network
    ports:
      - "9001:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://postgres:5432/sonarqube
      - SONAR_WEB_CONTEXT=/sonar
      - SONAR_JDBC_USERNAME=${POSTGRES_USER}
      - SONAR_JDBC_PASSWORD=${POSTGRES_PASSWORD}
      - SONAR_WEB_CONTEXT=/sonar
    depends_on:
      - postgres
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # 🗄️ REDIS - Cache
  # ══════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - devops-network
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════
  # 🌐 NGINX - Reverse Proxy
  # ══════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: nginx
    networks:
      - devops-network
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - jenkins
      - grafana
      - sonarqube
      - kafka-ui
    restart: unless-stopped
# ============================================================
# 🚀 QUICK START COMMANDS
# ============================================================
#
# Start all services:
#   docker-compose up -d
#
# Start specific service:
#   docker-compose up -d jenkins
#
# View logs:
#   docker-compose logs -f kafka
#
# Stop all:
#   docker-compose down
#
# Stop and remove volumes (full reset):
#   docker-compose down -v
#
# Restart service:
#   docker-compose restart jenkins
#
# ⚠️  If Kafka has InconsistentClusterIdException, wipe BOTH:
#   docker-compose stop kafka zookeeper
#   docker rm kafka zookeeper
#   docker volume rm docker_kafka-data docker_zookeeper-data
#   docker-compose up -d zookeeper && sleep 10 && docker-compose up -d kafka
#
# ============================================================
# 🌐 SERVICE ACCESS URLS
# ============================================================
#
# Via Nginx (single entry point):
# Landing Page:  http://localhost
# Jenkins:       http://localhost/jenkins
# Grafana:       http://localhost/grafana/
# SonarQube:     http://localhost/sonar/
# Kafka UI:      http://localhost/kafka-ui/
# Prometheus:    http://localhost/prometheus/
#
# Direct ports (bypass Nginx):
# Jenkins:       http://localhost:8080
# Grafana:       http://localhost:3000
# Prometheus:    http://localhost:9091
# SonarQube:     http://localhost:9001
# Kafka UI:      http://localhost:8081
# PostgreSQL:    localhost:5434
# Redis:         localhost:6380
#
# ============================================================
# 📊 RESOURCE REQUIREMENTS
# ============================================================
#
# CPU: ~4-6 cores recommended
# RAM: ~8-12 GB minimum
# Disk: ~20 GB for volumes
#
# - Jenkins:    2GB RAM
# - SonarQube:  2GB RAM  (also needs vm.max_map_count=262144)
# - Kafka:      1GB RAM
# - Prometheus: 1GB RAM
# - Grafana:    512MB RAM
# - Others:     ~2GB combined
#
# Set vm.max_map_count permanently:
#   echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.conf
#   sudo sysctl -w vm.max_map_count=262144
#
# ============================================================
